<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<style>

/* =========================
   BASE
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background-image: url("hero.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* =========================
   CENTER FIX (IMPORTANT CHANGE)
========================= */
.form-wrap {
  position: fixed;              /* FIXES MOBILE + SCROLL ISSUES */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  padding-top: 20vh;            /* pushes it slightly lower on hero */
  box-sizing: border-box;
}

/* =========================
   BREVO RESET (STRONG)
========================= */
.sib-form,
#sib-container,
.sib-container--large,
.sib-container--vertical {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  width: 100% !important;
  max-width: 320px !important;
  padding: 0 !important;
  margin: 0 !important;
}

/* REMOVE SPACING THAT WAS PUSHING EVERYTHING DOWN */
.sib-form-block {
  padding: 0 !important;
  margin: 0 !important;
}

/* =========================
   TEXT
========================= */
.sib-form-block p {
  text-align: center;
  color: rgba(201,170,90,0.95);
  margin: 0;
  font-size: 13px;
  line-height: 1.4;
}

.sib-form-block p:first-child {
  font-weight: 600;
}

/* =========================
   INPUT (FIXED CENTER LOOK)
========================= */
input[type="email"],
input[type="text"] {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.35);
  color: white;
  font-size: 13px;
  box-sizing: border-box;
}

input::placeholder {
  color: rgba(255,255,255,0.55);
}

/* =========================
   BUTTON
========================= */
button {
  width: 100%;
  padding: 10px;
  background: rgba(200,170,90,0.9);
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: .5px;
}

button:hover {
  background: rgba(220,190,110,0.95);
}

/* =========================
   HIDE BOT FIELD (SAFE)
========================= */
input[name="email_address_check"] {
  position: absolute !important;
  left: -9999px !important;
}

</style>

<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">

</head>

<body>

<div class="form-wrap">

  <div class="sib-form">
    <div id="sib-form-container" class="sib-form-container">

      <div id="sib-container" class="sib-container--large sib-container--vertical">

        <form
          id="sib-form"
          method="POST"
          action="https://0140e1bd.sibforms.com/serve/MUIFAOOVyIg_Cfwv5nZp80lUy3Enq3zIE1JJFI4e_2mbkZEM5TGt8WScTgwGKPGUPcB6wjlwcq_w-Pq33aDPaW1qS3bo7hs7GkblmCLNYOHWYi2yLnHD7tv5gcrz7WOQlG-s5eDX07mhQk1Z6ReuGbFq_IYCd4BUwtPmhk0bBYUf9kOezm6ew1H0yi4j44l29V-jm1HZ2xcZxY0IKQ=="
          data-type="subscription"
        >

          <div class="sib-form-block">
            <p>Newsletter</p>
            <p>Stay updated with The Green Sturgeon</p>
          </div>

          <input
            type="email"
            id="EMAIL"
            name="EMAIL"
            placeholder="Enter your email"
            required
          >

          <button type="submit">SUBSCRIBE</button>

          <input type="text" name="email_address_check" value="" autocomplete="off">
          <input type="hidden" name="locale" value="en">

        </form>

      </div>
    </div>
  </div>

</div>

<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>

</body>
</html>
