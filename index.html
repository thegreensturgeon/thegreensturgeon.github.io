<style>
  /* Hide the third empty box / spacer if Brevo injects it */
  #sib-container .sib-form-block:empty,
  #sib-container .sib-form-message-panel,
  #sib-container .sib-form-message-panel--active,
  #sib-container .sib-form-message-panel__text,
  #sib-container .sib-alert-message,
  #sib-container .sib-form-block__message,
  #sib-container .sib-loader {
    display: none !important;
  }

  /* Optional: hide any empty direct children that create blank rows */
  #sib-container > div:empty {
    display: none !important;
  }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  function removeBrevoGhostBoxes() {
    const selectors = [
      '#sib-container .sib-form-message-panel',
      '#sib-container .sib-form-message-panel--active',
      '#sib-container .sib-form-message-panel__text',
      '#sib-container .sib-alert-message',
      '#sib-container .sib-form-block__message',
      '#sib-container .sib-loader',
      '#sib-container .sib-form-block:empty',
      '#sib-container > div:empty'
    ];

    selectors.forEach(sel => {
      document.querySelectorAll(sel).forEach(el => el.style.display = "none");
    });

    document.querySelectorAll('#sib-container div').forEach(div => {
      const text = (div.innerText || '').trim();
      if (!text && div.children.length === 0) {
        div.style.display = "none";
      }
    });
  }

  removeBrevoGhostBoxes();

  const target = document.body;
  if (target) {
    const observer = new MutationObserver(removeBrevoGhostBoxes);
    observer.observe(target, { childList: true, subtree: true });
  }
});
</script>
