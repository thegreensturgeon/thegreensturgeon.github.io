<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<style>
/* Prevent any white side gaps */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

/* Full screen image */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

/* Overlay form layer */
.form-layer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 2;
}

/* Invisible inputs (we will align these over your image fields) */
input {
  position: absolute;
  border: none;
  background: transparent;
  outline: none;
  color: transparent; /* keeps text invisible so design stays clean */
}

/* Adjust these positions to match your image */
#name {
  top: 42%;
  left: 15%;
  width: 70%;
  height: 5%;
}

#email {
  top: 50%;
  left: 15%;
  width: 70%;
  height: 5%;
}

#birthday {
  top: 58%;
  left: 15%;
  width: 70%;
  height: 5%;
}

/* Invisible button overlay */
button {
  position: absolute;
  top: 68%;
  left: 25%;
  width: 50%;
  height: 6%;
  background: transparent;
  border: none;
}
</style>
</head>

<body>

<img id="bg" src="hero.jpg" alt="Background" />

<form class="form-layer"
      action="mailto:TheGreenSturgeon@yahoo.com"
      method="POST"
      enctype="text/plain">

  <input id="name" name="name" type="text" placeholder="Name" required />

  <input id="email" name="email" type="email" placeholder="Email" required />

  <input id="birthday" name="birthday" type="date" required />

  <button type="submit"></button>

</form>

</body>
</html>
