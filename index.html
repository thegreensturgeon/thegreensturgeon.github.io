<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<style>
/* =========================
   PAGE BACKGROUND
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;

  /* ORIGINAL HERO IMAGE */
  background-image: url("hero.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* =========================
   CENTER FORM WRAP
========================= */
.form-wrap {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(360px, 90vw);
  z-index: 10;
}

/* =========================
   BREVO RESET (IMPORTANT)
========================= */
#sib-container,
.sib-container--large,
.sib-form {
  width: 100% !important;
  max-width: 100% !important;
  box-sizing: border-box !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
}

/* =========================
   TEXT
========================= */
.sib-form-block p {
  color: rgba(255,255,255,0.9) !important;
  margin: 0 0 6px 0;
}

.entry__label {
  color: rgba(255,255,255,0.85) !important;
  font-size: 13px;
}

/* =========================
   INPUT FIX (NO CUT OFF TEXT)
========================= */
input {
  width: 100% !important;
  box-sizing: border-box;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.25);
  color: white;
  border-radius: 6px;
  outline: none;
  font-size: 14px;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

/* =========================
   BUTTON
========================= */
button {
  width: 100%;
  padding: 12px;
  background: rgba(200, 170, 90, 0.85);
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: rgba(220, 190, 110, 0.95);
}
</style>
</head>

<body>

<div class="form-wrap">

  <!-- BREVO FORM -->
  <div class="sib-form">
    <div id="sib-form-container" class="sib-form-container">
      <div id="sib-container" class="sib-container--large sib-container--vertical">

        <form id="sib-form"
              method="POST"
              action="https://0140e1bd.sibforms.com/serve/MUIFAOOVyIg_Cfwv5nZp80lUy3Enq3zIE1JJFI4e_2mbkZEM5TGt8WScTgwGKPGUPcB6wjlwcq_w-Pq33aDPaW1qS3bo7hs7GkblmCLNYOHWYi2yLnHD7tv5gcrz7WOQlG-s5eDX07mhQk1Z6ReuGbFq_IYCd4BUwtPmhk0bBYUf9kOezm6ew1H0yi4j44l29V-jm1HZ2xcZxY0IKQ==">

          <div class="sib-form-block">
            <p style="font-size:22px; font-weight:700;">Newsletter</p>
            <p style="font-size:14px;">Stay updated with The Green Sturgeon</p>
          </div>

          <label class="entry__label">Email</label>
          <input type="email" id="EMAIL" name="EMAIL" placeholder="Enter your email" required />

          <button type="submit">SUBSCRIBE</button>

          <input type="text" name="email_address_check" value="" class="input--hidden">
          <input type="hidden" name="locale" value="en">
          <input type="hidden" name="html_type" value="simple">

        </form>

      </div>
    </div>
  </div>

</div>

</body>
</html>
