<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

<title>The Green Sturgeon</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;

  background-image: url("https://thegreensturgeon.github.io/hero.jpg?v=3");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* FORM LAYER */
.form-layer {
  position: fixed;
  inset: 0;
  z-index: 2;
}

/* INPUTS */
input {
  position: absolute;
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
  color: rgba(255,255,255,0.85);
  caret-color: white;
}

input:focus {
  background: rgba(255,255,255,0.10);
  border-radius: 4px;
}

/* POSITIONING */
#name {
  top: 51.5%;
  left: 29%;
  width: 37%;
  height: 2%;
}

#email {
  top: 55.2%;
  left: 29%;
  width: 37%;
  height: 2%;
}

#birthday {
  top: 59%;
  left: 29%;
  width: 37%;
  height: 2%;
}

/* INVISIBLE BUTTON HIT AREA */
#joinButton {
  position: absolute;
  top: 63%;
  left: 29%;
  width: 37%;
  height: 3%;
  background: transparent;
  border: none;
  cursor: pointer;
}

/* SUCCESS OVERLAY */
#successMessage {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
}

.success-box {
  text-align: center;
  color: white;
  padding: 22px 30px;
  border-radius: 10px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
}

.success-box h2 {
  margin: 0 0 8px 0;
  font-size: 22px;
}

.success-box p {
  margin: 0;
  font-size: 14px;
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="form-layer">

  <input id="name" type="text" placeholder="Name" />
  <input id="email" type="email" placeholder="Email" />
  <input id="birthday" type="text" placeholder="Bday mm/dd/yyyy" />

  <button id="joinButton"></button>

</div>

<!-- SUCCESS MESSAGE -->
<div id="successMessage">
  <div class="success-box">
    <h2>You're in.</h2>
    <p>Welcome to The Green Sturgeon.</p>
  </div>
</div>

<!-- HIDDEN BREVO FORM -->
<form id="brevoForm"
      method="POST"
      target="hidden_iframe"
      action="https://0140e1bd.sibforms.com/serve/MUIFAOOVyIg_Cfwv5nZp80lUy3Enq3zIE1JJFI4e_2mbkZEM5TGt8WScTgwGKPGUPcB6wjlwcq_w-Pq33aDPaW1qS3bo7hs7GkblmCLNYOHWYi2yLnHD7tv5gcrz7WOQlG-s5eDX07mhQk1Z6ReuGbFq_IYCd4BUwtPmhk0bBYUf9kOezm6ew1H0yi4j44l29V-jm1HZ2xcZxY0IKQ==">

  <input type="hidden" name="EMAIL" id="brevo_email">
  <input type="hidden" name="FIRSTNAME" id="brevo_name">
  <input type="hidden" name="BIRTHDAY" id="brevo_birthday">

  <input type="hidden" name="locale" value="en">
  <input type="hidden" name="html_type" value="simple">

</form>

<!-- hidden iframe prevents redirect -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
document.getElementById("joinButton").addEventListener("click", function (e) {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const name = document.getElementById("name").value.trim();
  const birthday = document.getElementById("birthday").value.trim();

  // basic validation
  if (!email || !name) {
    alert("Please fill out name and email.");
    return;
  }

  // map fields
  document.getElementById("brevo_email").value = email;
  document.getElementById("brevo_name").value = name;
  document.getElementById("brevo_birthday").value = birthday;

  // submit silently
  document.getElementById("brevoForm").submit();

  // show success overlay
  document.getElementById("successMessage").style.display = "flex";

  // optional cleanup
  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("birthday").value = "";

  // auto-hide after 3 seconds (optional)
  setTimeout(() => {
    document.getElementById("successMessage").style.display = "none";
  }, 3000);
});
</script>

</body>
</html>
