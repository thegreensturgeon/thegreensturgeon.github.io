<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Green Sturgeon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #0f1f17;
  color: #f4f4f4;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 500px;
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

p {
  opacity: 0.85;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
  font-size: 1rem;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: #2ecc71;
  color: white;
  font-size: 1rem;
}

.small {
  margin-top: 12px;
  font-size: 0.85rem;
  opacity: 0.7;
}

.message {
  margin-top: 10px;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="container">

  <h1>The Green Sturgeon</h1>

  <p>Fresh updates and drops.<br>No spam.</p>

  <input type="email" id="email" placeholder="Enter your email" />

  <button onclick="saveEmail()">Subscribe</button>

  <div id="message" class="message"></div>

  <div class="small">You can unsubscribe anytime.</div>

</div>

<script>
function saveEmail() {
  const email = document.getElementById("email").value;
  const message = document.getElementById("message");

  if (!email) {
    message.textContent = "Please enter an email.";
    message.style.color = "salmon";
    return;
  }

  let list = JSON.parse(localStorage.getItem("emails") || "[]");
  list.push(email);
  localStorage.setItem("emails", JSON.stringify(list));

  document.getElementById("email").value = "";

  message.textContent = "Subscribed successfully!";
  message.style.color = "#2ecc71";
}
</script>

</body>
</html>
