<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Green Sturgeon</title>

<style>
• {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: Arial, sans-serif;
}

html, body {
height: 100%;
width: 100%;
overflow: hidden;
}

/* FULL SCREEN BACKGROUND IMAGE */
body {
background: url("hero.jpg") no-repeat center center;
background-size: cover;
position: relative;
}

/* DARK OVERLAY (light, so image still shows) */
body::before {
content: "";
position: absolute;
inset: 0;
background: rgba(0,0,0,0.35);
z-index: 0;
}

/* FORM WRAPPER (NO BLOCKING LAYER) */
.form-box {
position: relative;
z-index: 2;

height: 100%;
width: 100%;

display: flex;
flex-direction: column;
justify-content: center;
align-items: center;

text-align: center;
padding: 20px;
color: white;
}

/* HEADINGS */
h1 {
letter-spacing: 2px;
margin-bottom: 6px;
}

p {
font-size: 12px;
margin-bottom: 18px;
opacity: 0.8;
}

/* FORM STYLE */
form {
width: 100%;
max-width: 320px;
}

input {
width: 100%;
padding: 12px;
margin: 8px 0;

border: 1px solid rgba(255,255,255,0.25);
background: rgba(0,0,0,0.35);
color: white;

outline: none;
border-radius: 4px;
}

input::placeholder {
color: rgba(255,255,255,0.7);
}

/* BUTTON */
button {
width: 100%;
padding: 12px;
margin-top: 10px;

background: gold;
border: none;
font-weight: bold;
cursor: pointer;
border-radius: 4px;
}

/* MOBILE FIX */
@media (max-width: 480px) {
form {
max-width: 90%;
}
}
</style>
</head>

<body>

<div class="form-box">

<h1>COMING SOON</h1>
<p>Stay connected</p>

<form name="signup" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="signup" />

<input type="text" name="name" placeholder="Enter your name" required />
<input type="email" name="email" placeholder="Enter your email" required />
<input type="date" name="birthday" required />

<button type="submit">JOIN</button>
</form>

</div>

</body>
</html>
