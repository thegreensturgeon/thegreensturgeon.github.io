<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<!-- Brevo required styles (DO NOT REMOVE) -->
<style>
@font-face {
  font-display: block;
  font-family: Roboto;
  src: url(https://assets.brevo.com/font/Roboto/Latin/normal/normal/7529907e9eaf8ebb5220c5f9850e3811.woff2) format("woff2"),
       url(https://assets.brevo.com/font/Roboto/Latin/normal/normal/25c678feafdc175a70922a116c9be3e7.woff) format("woff");
}

body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;

  background-image: url("hero.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* CENTER FORM */
.form-wrap {
  position: absolute;
  top: 66%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(320px, 88vw);
  z-index: 10;
}

/* ONLY SAFE OVERRIDES */
#sib-container {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.sib-form-message-panel {
  display: none !important;
}

/* TEXT */
.sib-form-block p {
  text-align: center;
  color: rgba(201,170,90,0.95);
  margin: 0;
  font-size: 13px;
}

/* INPUT */
input[type="text"], input[type="email"] {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.25);
  color: white;
  font-size: 13px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: rgba(200,170,90,0.85);
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 12px;
}

button:hover {
  background: rgba(220,190,110,0.95);
}

/* HIDE BOT FIELD (SAFE) */
input[name="email_address_check"] {
  position: absolute;
  left: -9999px;
}
</style>

<!-- REQUIRED BREVO STYLE -->
<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">

</head>

<body>

<div class="form-wrap">

  <!-- ================= BREVO ORIGINAL FORM (REQUIRED STRUCTURE) ================= -->
  <div class="sib-form">
    <div id="sib-form-container" class="sib-form-container">

      <div id="sib-container" class="sib-container--large sib-container--vertical">

        <form
          id="sib-form"
          method="POST"
          action="https://0140e1bd.sibforms.com/serve/MUIFAOOVyIg_Cfwv5nZp80lUy3Enq3zIE1JJFI4e_2mbkZEM5TGt8WScTgwGKPGUPcB6wjlwcq_w-Pq33aDPaW1qS3bo7hs7GkblmCLNYOHWYi2yLnHD7tv5gcrz7WOQlG-s5eDX07mhQk1Z6ReuGbFq_IYCd4BUwtPmhk0bBYUf9kOezm6ew1H0yi4j44l29V-jm1HZ2xcZxY0IKQ=="
          data-type="subscription"
        >

          <!-- TEXT -->
          <div class="sib-form-block">
            <p>Newsletter</p>
            <p>Stay updated with The Green Sturgeon</p>
          </div>

          <!-- EMAIL (KEEP EXACT NAME) -->
          <div class="sib-input sib-form-block">
            <input
              type="email"
              id="EMAIL"
              name="EMAIL"
              placeholder="Enter your email"
              required
            >
          </div>

          <!-- SUBMIT -->
          <div class="sib-form-block">
            <button type="submit">
              SUBSCRIBE
            </button>
          </div>

          <!-- REQUIRED BREVO HIDDEN FIELD -->
          <input type="text" name="email_address_check" value="" autocomplete="off">

          <input type="hidden" name="locale" value="en">

        </form>

      </div>
    </div>
  </div>

</div>

<!-- REQUIRED SCRIPT (MUST BE LAST) -->
<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>

</body>
</html>
