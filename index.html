<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<style>

/* =========================
   BACKGROUND
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;

  background-image: url("hero.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* =========================
   FORM POSITION
========================= */
.form-wrap {
  position: absolute;
  top: 74%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(310px, 88vw);
  z-index: 10;
}

/* =========================
   BREVO RESET
========================= */
#sib-container,
.sib-container--large,
.sib-form {
  width: 100% !important;
  max-width: 100% !important;
  box-sizing: border-box !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
}

/* =========================
   NEWSLETTER BLOCK
========================= */
.sib-form-block p {
  text-align: center;
  color: rgba(201,170,90,0.95) !important;
  margin: 0;
  font-size: 13px !important;
  line-height: 1.4;
}

.sib-form-block p:first-child {
  font-weight: 600;
  margin-bottom: 2px;
}

/* =========================
   REMOVE EMAIL LABEL
========================= */
.entry__label {
  display: none !important;
}

/* =========================
   EMAIL INPUT
========================= */
input[type="email"] {
  width: 100% !important;
  box-sizing: border-box;
  padding: 8px;
  margin-top: 10px;
  margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.25);
  color: white;
  border-radius: 6px;
  outline: none;
  font-size: 13px;
}

input[type="email"]::placeholder {
  color: rgba(255,255,255,0.5);
}

/* =========================
   SUBSCRIBE BUTTON
========================= */
button {
  width: 100%;
  padding: 8px;
  background: rgba(200,170,90,0.85);
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: .5px;
}

button:hover {
  background: rgba(220,190,110,0.95);
}

/* =========================
   HIDE BREVO HIDDEN FIELD
========================= */
.input--hidden,
input[name="email_address_check"] {
  display: none !important;
  visibility: hidden !important;
  width: 0 !important;
  height: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
  border: none !important;
}

</style>
</head>

<body>

<div class="form-wrap">

  <div class="sib-form">
    <div id="sib-form-container" class="sib-form-container">
      <div id="sib-container" class="sib-container--large sib-container--vertical">

        <form
          id="sib-form"
          method="POST"
          action="https://0140e1bd.sibforms.com/serve/MUIFAOOVyIg_Cfwv5nZp80lUy3Enq3zIE1JJFI4e_2mbkZEM5TGt8WScTgwGKPGUPcB6wjlwcq_w-Pq33aDPaW1qS3bo7hs7GkblmCLNYOHWYi2yLnHD7tv5gcrz7WOQlG-s5eDX07mhQk1Z6ReuGbFq_IYCd4BUwtPmhk0bBYUf9kOezm6ew1H0yi4j44l29V-jm1HZ2xcZxY0IKQ==">

          <!-- Newsletter -->
          <div class="sib-form-block">
            <p>Newsletter</p>
            <p>Stay updated with The Green Sturgeon</p>
          </div>

          <!-- Email -->
          <input
            type="email"
            id="EMAIL"
            name="EMAIL"
            placeholder="Enter your email"
            required
          >

          <!-- Subscribe -->
          <button type="submit">
            SUBSCRIBE
          </button>

          <!-- Hidden Brevo Fields -->
          <input
            type="text"
            name="email_address_check"
            value=""
            class="input--hidden"
            tabindex="-1"
            autocomplete="off"
          >

          <input
            type="hidden"
            name="locale"
            value="en"
          >

          <input
            type="hidden"
            name="html_type"
            value="simple"
          >

        </form>

      </div>
    </div>
  </div>

</div>

</body>
</html>
