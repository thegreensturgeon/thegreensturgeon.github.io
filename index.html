<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

<title>The Green Sturgeon</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;

  /* FIX: background now handled properly */
  background-image: url("https://thegreensturgeon.github.io/hero.jpg?v=3");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Overlay form stays fixed */
.form-layer {
  position: fixed;
  inset: 0;
  z-index: 2;
}

/* Inputs */
input, button {
  position: absolute;
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
}

/* Make text visible */
input {
  color: rgba(255,255,255,0.85);
  caret-color: white;
}

/* Focus highlight */
input:focus {
  background: rgba(255,255,255,0.10);
  border-radius: 4px;
}

/* POSITIONING */
#name {
  top: 51.5%;
  left: 29%;
  width: 37%;
  height: 2%;
}

#email {
  top: 55.2%;
  left: 29%;
  width: 37%;
  height: 2%;
}

#birthday {
  top: 59%;
  left: 29%;
  width: 37%;
  height: 2%;
}

/* Button */
button {
  top: 63%;
  left: 29%;
  width: 37%;
  height: 2%;
  background: transparent;
}
</style>
</head>

<body>

<form class="form-layer"
      action="mailto:TheGreenSturgeon@yahoo.com"
      method="POST"
      enctype="text/plain">

  <input id="name" name="name" type="text" placeholder="Name" required />
  <input id="email" name="email" type="email" placeholder="Email" required />
  <input id="birthday" name="birthday" type="text" placeholder="Bday mm/dd/yyyy" required />

  <button type="submit"></button>
</form>

</body>
</html>
