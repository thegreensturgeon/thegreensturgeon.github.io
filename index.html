<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

<title>The Green Sturgeon</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

/* Background image locked to screen */
#bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Overlay form stays fixed (does NOT move on keyboard) */
.form-layer {
  position: fixed;
  inset: 0;
  z-index: 2;
}

/* Inputs */
input, button {
  position: absolute;
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
}

/* 👁️ Make text visible (important fix) */
input {
  color: rgba(255,255,255,0.85);
  caret-color: white;
}

/* OPTIONAL: helps you see alignment while testing
   (remove later if you want fully invisible inputs) */
input:focus {
  background: rgba(255,255,255,0.10);
  border-radius: 4px;
}

/* POSITIONING (your original layout) */
#name {
  top: 58%;
  left: 43%;
  width: 50%;
  height: 4%;
}

#email {
  top: 62%;
  left: 43%;
  width: 50%;
  height: 4%;
}

#birthday {
  top: 66%;
  left: 43%;
  width: 50%;
  height: 4%;
}

/* Button */
button {
  top: 70%;
  left: 43%;
  width: 50%;
  height: 4%;
  background: transparent;
}
</style>
</head>

<body>

<img id="bg" src="https://thegreensturgeon.github.io/hero.jpg" />

<form class="form-layer"
      action="mailto:TheGreenSturgeon@yahoo.com"
      method="POST"
      enctype="text/plain">

  <input id="name" name="name" type="text" placeholder="Name" required />
  <input id="email" name="email" type="email" placeholder="Email" required />
  <input id="birthday" name="birthday" type="date" required />

  <button type="submit"></button>
</form>

</body>
</html>
