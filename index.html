<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<style>

/* =========================
   BACKGROUND
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;

  background-image: url("hero.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* =========================
   FORM WRAP (SMALLER)
========================= */
.form-wrap {
  position: absolute;
  top: 56%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(300px, 88vw); /* ⬅️ smaller box */
  z-index: 10;
}

/* =========================
   BREVO RESET
========================= */
#sib-container,
.sib-container--large,
.sib-form {
  width: 100% !important;
  max-width: 100% !important;
  box-sizing: border-box !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
}

/* =========================
   TEXT (FIX NEWSLETTER SIZE)
========================= */
.sib-form-block p:first-child {
  font-size: 16px !important;   /* ⬅️ was too big */
  font-weight: 600 !important;
  margin-bottom: 4px;
}

.sib-form-block p {
  font-size: 12px !important;
  color: rgba(255,255,255,0.85) !important;
  margin: 0 0 6px 0;
}

.entry__label {
  font-size: 12px !important;
  color: rgba(255,255,255,0.8) !important;
}

/* =========================
   INPUT (SMALLER + CLEAN)
========================= */
input {
  width: 100% !important;
  box-sizing: border-box;
  padding: 8px;            /* ⬅️ smaller */
  margin-top: 6px;
  margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.25);
  color: white;
  border-radius: 6px;
  outline: none;
  font-size: 13px;
}

/* placeholder */
input::placeholder {
  color: rgba(255,255,255,0.5);
}

/* =========================
   BUTTON (SMALLER)
========================= */
button {
  width: 100%;
  padding: 10px; /* ⬅️ smaller */
  background: rgba(200, 170, 90, 0.85);
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 13px;
}

button:hover {
  background: rgba(220, 190, 110, 0.95);
}

/* =========================
   🚨 HIDE BREVO EXTRA BOX
========================= */
.input--hidden,
input[name="email_address_check"] {
  display: none !important;
  height: 0 !important;
  width: 0 !important;
  opacity: 0 !important;
  position: absolute !important;
}

</style>
</head>

<body>

<div class="form-wrap">

  <div class="sib-form">
    <div id="sib-form-container" class="sib-form-container">
      <div id="sib-container" class="sib-container--large sib-container--vertical">

        <form id="sib-form"
              method="POST"
              action="https://0140e1bd.sibforms.com/serve/MUIFAOOVyIg_Cfwv5nZp80lUy3Enq3zIE1JJFI4e_2mbkZEM5TGt8WScTgwGKPGUPcB6wjlwcq_w-Pq33aDPaW1qS3bo7hs7GkblmCLNYOHWYi2yLnHD7tv5gcrz7WOQlG-s5eDX07mhQk1Z6ReuGbFq_IYCd4BUwtPmhk0bBYUf9kOezm6ew1H0yi4j44l29V-jm1HZ2xcZxY0IKQ==">

          <!-- TEXT -->
          <div class="sib-form-block">
            <p>Newsletter</p>
            <p>Stay updated with The Green Sturgeon</p>
          </div>

          <!-- EMAIL -->
          <label class="entry__label">Email</label>
          <input type="email" id="EMAIL" name="EMAIL" placeholder="Enter your email" required />

          <!-- BUTTON -->
          <button type="submit">SUBSCRIBE</button>

          <!-- HIDDEN BREVO FIELD (ANTI-SPAM) -->
          <input type="text" name="email_address_check" value="" class="input--hidden">
          <input type="hidden" name="locale" value="en">
          <input type="hidden" name="html_type" value="simple">

        </form>

      </div>
    </div>
  </div>

</div>

</body>
</html>
