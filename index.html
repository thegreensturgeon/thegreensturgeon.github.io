<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

#bg {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

.form-layer {
  position: fixed;
  inset: 0;
  z-index: 2;
}

input, button {
  position: absolute;
  border: none;
  background: transparent;
  outline: none;
}

input {
  color: transparent;
  caret-color: transparent;
}

#name {
  top: 57%;
  left: 50%;
  width: 50%;
  height: 4%;
}

#email {
  top: 61%;
  left: 50%;
  width: 50%;
  height: 4%;
}

#birthday {
  top: 65%;
  left: 50%;
  width: 50%;
  height: 4%;
}

button {
  top: 69%;
  left: 50%;
  width: 50%;
  height: 4%;
}
</style>
</head>

<body>

<img
  id="bg"
  src="https://thegreensturgeon.github.io/hero.jpg"
  alt="Background"
/>

<form class="form-layer"
      action="mailto:TheGreenSturgeon@yahoo.com"
      method="POST"
      enctype="text/plain">
  <input id="name" name="name" type="text" placeholder="Name" required />
  <input id="email" name="email" type="email" placeholder="Email" required />
  <input id="birthday" name="birthday" type="date" required />
  <button type="submit"></button>
</form>

</body>
</html>
