<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<style>

/* =========================
   BACKGROUND
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;

  background-image: url("hero.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* =========================
   FORM POSITION
========================= */
.form-wrap {
  position: absolute;
  top: 66%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(320px, 88vw);
  z-index: 10;
}

/* =========================
   BREVO RESET (SAFE VERSION)
========================= */
#sib-container,
.sib-container--large,
.sib-form {
  width: 100% !important;
  max-width: 100% !important;
  box-sizing: border-box !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
}

/* hide default Brevo panels but KEEP functionality */
.sib-form-message-panel {
  display: none !important;
}

/* =========================
   TEXT
========================= */
.sib-form-block p {
  text-align: center;
  color: rgba(201,170,90,0.95) !important;
  margin: 0;
  font-size: 13px !important;
  line-height: 1.4;
}

.sib-form-block p:first-child {
  font-weight: 600;
  margin-bottom: 2px;
}

/* =========================
   EMAIL INPUT (IMPORTANT FIX)
========================= */
input[type="text"],
input[type="email"] {
  width: 100% !important;
  box-sizing: border-box;
  padding: 10px;
  margin-top: 10px;
  margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.25);
  color: white;
  border-radius: 6px;
  outline: none;
  font-size: 13px;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

/* =========================
   BUTTON
========================= */
button {
  width: 100%;
  padding: 10px;
  background: rgba(200,170,90,0.85);
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 12px;
  letter-spacing: .5px;
}

button:hover {
  background: rgba(220,190,110,0.95);
}

/* =========================
   KEEP BREVO HIDDEN FIELD SAFE (DO NOT REMOVE)
========================= */
.input--hidden,
input[name="email_address_check"] {
  position: absolute !important;
  left: -9999px !important;
  opacity: 0 !important;
  height: 0 !important;
  width: 0 !important;
}

/* =========================
   MOBILE TWEAK
========================= */
@media (max-width: 480px) {
  .form-wrap {
    top: 70%;
    width: 90vw;
  }
}

</style>
</head>

<body>

<div class="form-wrap">

  <!-- BREVO FORM (FULL SAFE EMBED) -->
  <div class="sib-form">
    <div id="sib-container" class="sib-container--large sib-container--vertical">

      <form
        id="sib-form"
        method="POST"
        action="https://0140e1bd.sibforms.com/serve/MUIFAOOVyIg_Cfwv5nZp80lUy3Enq3zIE1JJFI4e_2mbkZEM5TGt8WScTgwGKPGUPcB6wjlwcq_w-Pq33aDPaW1qS3bo7hs7GkblmCLNYOHWYi2yLnHD7tv5gcrz7WOQlG-s5eDX07mhQk1Z6ReuGbFq_IYCd4BUwtPmhk0bBYUf9kOezm6ew1H0yi4j44l29V-jm1HZ2xcZxY0IKQ=="
        data-type="subscription"
      >

        <!-- TEXT -->
        <div class="sib-form-block">
          <p>Newsletter</p>
          <p>Stay updated with The Green Sturgeon</p>
        </div>

        <!-- EMAIL (KEEP NAME EXACTLY EMAIL) -->
        <input
          type="text"
          id="EMAIL"
          name="EMAIL"
          placeholder="Enter your email"
          autocomplete="off"
          required
        >

        <!-- SUBMIT -->
        <button type="submit">
          SUBSCRIBE
        </button>

        <!-- REQUIRED BREVO FIELD -->
        <input
          type="text"
          name="email_address_check"
          value=""
          tabindex="-1"
          autocomplete="off"
        >

        <input type="hidden" name="locale" value="en">

      </form>

    </div>
  </div>

</div>

<!-- CRITICAL BREVO SCRIPT (DO NOT REMOVE) -->
<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>

</body>
</html>
