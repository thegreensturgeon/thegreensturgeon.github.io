<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>The Green Sturgeon</title>

<!-- Brevo Fonts + Base Styles -->
<style>
@font-face {
  font-display: block;
  font-family: Roboto;
  src: url(https://assets.brevo.com/font/Roboto/Latin/normal/normal/7529907e9eaf8ebb5220c5f9850e3811.woff2) format("woff2"),
       url(https://assets.brevo.com/font/Roboto/Latin/normal/normal/25c678feafdc175a70922a116c9be3e7.woff) format("woff");
}

@font-face {
  font-display: fallback;
  font-family: Roboto;
  font-weight: 600;
  src: url(https://assets.brevo.com/font/Roboto/Latin/medium/normal/6e9caeeafb1f3491be3e32744bc30440.woff2) format("woff2"),
       url(https://assets.brevo.com/font/Roboto/Latin/medium/normal/71501f0d8d5aa95960f6475d5487d4c2.woff) format("woff");
}

@font-face {
  font-display: fallback;
  font-family: Roboto;
  font-weight: 700;
  src: url(https://assets.brevo.com/font/Roboto/Latin/bold/normal/3ef7cf158f310cf752d5ad08cd0e7e60.woff2) format("woff2"),
       url(https://assets.brevo.com/font/Roboto/Latin/bold/normal/ece3a1d82f18b60bcce0211725c476aa.woff) format("woff");
}

/* PAGE BACKGROUND */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;

  background-image: url("/mnt/data/1782711996594.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* CENTER FORM IN EMPTY WATER AREA */
.form-wrap {
  position: absolute;
  top: 56%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 420px;
  z-index: 5;
}

/* REMOVE BREVO BOX STYLING */
#sib-container {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

/* TEXT STYLING */
.sib-form-block {
  background: transparent !important;
}

.sib-form-block p,
.entry__label {
  color: rgba(255,255,255,0.85) !important;
}

/* INPUT STYLING */
input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.25);
  color: white;
  border-radius: 6px;
  outline: none;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: rgba(200, 170, 90, 0.85);
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: rgba(220, 190, 110, 0.95);
}
</style>
</head>

<body>

<div class="form-wrap">

<!-- Begin Brevo Form -->
<div class="sib-form">
  <div id="sib-form-container" class="sib-form-container">

    <div id="sib-container" class="sib-container--large sib-container--vertical">

      <form id="sib-form"
            method="POST"
            action="https://0140e1bd.sibforms.com/serve/MUIFAOOVyIg_Cfwv5nZp80lUy3Enq3zIE1JJFI4e_2mbkZEM5TGt8WScTgwGKPGUPcB6wjlwcq_w-Pq33aDPaW1qS3bo7hs7GkblmCLNYOHWYi2yLnHD7tv5gcrz7WOQlG-s5eDX07mhQk1Z6ReuGbFq_IYCd4BUwtPmhk0bBYUf9kOezm6ew1H0yi4j44l29V-jm1HZ2xcZxY0IKQ==">

        <div class="sib-form-block">
          <p style="font-size:22px; font-weight:700;">Newsletter</p>
          <p style="font-size:14px;">Stay updated with The Green Sturgeon</p>
        </div>

        <label class="entry__label">Email</label>
        <input type="text" id="EMAIL" name="EMAIL" placeholder="Enter your email" required />

        <button type="submit">SUBSCRIBE</button>

        <input type="text" name="email_address_check" value="" class="input--hidden">
        <input type="hidden" name="locale" value="en">
        <input type="hidden" name="html_type" value="simple">

      </form>
    </div>
  </div>
</div>

</div>

</body>
</html>
